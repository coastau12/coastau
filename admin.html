<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Management — Coast</title>
    <link rel="icon" href="https://i.postimg.cc/mkyVn8Mr/Coast.webp"/>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --bg: #020614; --bg-card: #0a1536; --accent: #00d4ff; --text: #e2e8f0; --text-muted: #829ab1; --border: rgba(0, 212, 255, 0.15); --danger: #ff3366; --success: #00ff88; }
        body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        .topbar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 0 5%; height: 72px; background: rgba(2, 6, 20, 0.95); backdrop-filter: blur(18px); border-bottom: 1px solid var(--border); animation: fadeIn 0.6s; }
        .brand { display: flex; align-items: center; gap: 12px; }
        .brand img { height: 32px; border-radius: 6px; transition: transform 0.3s; }
        .brand img:hover { transform: scale(1.05); }
        .brand-text { font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted); }
        .logout { background: transparent; color: var(--text-muted); border: 1px solid var(--border); padding: 8px 16px; border-radius: 4px; font-family: inherit; font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: all 0.3s; }
        .logout:hover { border-color: var(--danger); color: var(--danger); transform: translateY(-2px); }

        .container { max-width: 1200px; margin: 0 auto; padding: 100px 5% 60px; }
        .page-header { margin-bottom: 40px; border-bottom: 1px solid var(--border); padding-bottom: 40px; animation: fadeInUp 0.6s; }
        .page-label { font-size: 12px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--accent); margin-bottom: 16px; font-weight: 600; }
        .page-title { font-size: clamp(36px, 6vw, 64px); font-weight: 700; letter-spacing: -0.02em; text-transform: uppercase; }

        .stats { display: flex; gap: 40px; margin-bottom: 40px; animation: fadeInUp 0.6s 0.1s both; }
        .stat { display: flex; flex-direction: column; transition: transform 0.3s; }
        .stat:hover { transform: translateY(-5px); }
        .stat-value { font-size: 48px; font-weight: 700; color: var(--accent); line-height: 1; transition: color 0.3s; }
        .stat:hover .stat-value { color: var(--text); }
        .stat-label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-top: 8px; }

        .section { border-top: 1px solid var(--border); padding: 30px 0; animation: fadeInUp 0.6s 0.2s both; }
        .section-title { font-size: 14px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 24px; font-weight: 600; }

        .roster-table { width: 100%; border-collapse: collapse; }
        .roster-table th { text-align: left; padding: 16px 0; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); font-weight: 600; border-bottom: 1px solid var(--border); }
        .roster-table td { padding: 16px 0; font-size: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); transition: all 0.3s; }
        .roster-table tr { animation: slideIn 0.4s ease-out both; }
        .roster-table tr:nth-child(1) { animation-delay: 0.1s; }
        .roster-table tr:nth-child(2) { animation-delay: 0.2s; }
        .roster-table tr:nth-child(3) { animation-delay: 0.3s; }
        .roster-table tr:hover td { color: var(--accent); background: rgba(0, 212, 255, 0.03); }
        .player-tag { font-weight: 700; text-transform: uppercase; }
        .delete-btn { background: rgba(255,51,102,0.1); border: 1px solid rgba(255,51,102,0.3); color: var(--danger); padding: 6px 12px; border-radius: 4px; font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .delete-btn:hover { background: rgba(255,51,102,0.2); transform: scale(1.05); }

        .add-form { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; animation: fadeInUp 0.6s 0.3s both; }
        .form-group { display: flex; flex-direction: column; }
        .form-group.full { grid-column: 1 / -1; }
        .form-group label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; font-weight: 600; }
        .form-group input { background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: var(--text); padding: 14px; border-radius: 4px; font-family: inherit; font-size: 14px; outline: none; transition: all 0.3s; }
        .form-group input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1); transform: translateY(-2px); }
        
        .submit-btn { grid-column: 1 / -1; background: var(--accent); color: #000; border: none; padding: 16px; border-radius: 4px; font-family: inherit; font-size: 13px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: all 0.3s; margin-top: 10px; }
        .submit-btn:hover { opacity: 0.9; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0, 212, 255, 0.2); }

        .empty { color: var(--text-muted); padding: 40px 0; font-style: italic; }
        .toast { position: fixed; bottom: 24px; right: 24px; background: var(--success); color: #000; padding: 16px 24px; border-radius: 4px; font-weight: 600; transform: translateY(100px); opacity: 0; transition: all 0.3s; z-index: 1000; }
        .toast.show { transform: translateY(0); opacity: 1; }
        
        @media(max-width:768px){ .add-form { grid-template-columns: 1fr; } .stats { flex-direction: column; gap: 24px; } }
    </style>
</head>
<body>

    <div class="topbar">
        <div class="brand">
            <img src="https://i.postimg.cc/mkyVn8Mr/Coast.webp" alt="Coast"/>
            <div>
                <div style="font-weight:700; font-size:14px;">COAST</div>
                <div class="brand-text">Management</div>
            </div>
        </div>
        <button class="logout" onclick="logout()">Logout</button>
    </div>

    <div class="container">
        <div class="page-header">
            <div class="page-label">Control Panel</div>
            <h1 class="page-title">Roster Management</h1>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="statTotal">0</div>
                <div class="stat-label">Total Players</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="statTracker">0</div>
                <div class="stat-label">With Tracker</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="statImages">0</div>
                <div class="stat-label">With Images</div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Current Roster</div>
            <table class="roster-table">
                <thead>
                    <tr><th>Tag</th><th>Country</th><th style="text-align:right;">Action</th></tr>
                </thead>
                <tbody id="rosterBody">
                    <tr><td colspan="3" class="empty">No players found.</td></tr>
                </tbody>
            </table>
        </div>

        <div class="section">
            <div class="section-title">Add New Player</div>
            <form class="add-form" onsubmit="return false;">
                <div class="form-group">
                    <label>In-Game Tag *</label>
                    <input type="text" id="pTag" placeholder="e.g. Phantom" required/>
                </div>
                <div class="form-group">
                    <label>Country</label>
                    <input type="text" id="pCountry" placeholder="e.g. Australia"/>
                </div>
                <div class="form-group full">
                    <label>Tracker URL</label>
                    <input type="url" id="pTracker" placeholder="https://fortnitetracker.com/..."/>
                </div>
                <div class="form-group full">
                    <label>Image URL</label>
                    <input type="url" id="pImage" placeholder="Player image (optional)"/>
                </div>
                <button class="submit-btn" onclick="addPlayer()">Add Player</button>
            </form>
        </div>
    </div>
    
    <div class="toast" id="toast">Player added successfully</div>

    <script>
        if (localStorage.getItem('coast_admin_auth') !== 'true') {
            window.location.href = 'index.html';
        }
        
        function logout() {
            localStorage.removeItem('coast_admin_auth');
            window.location.href = 'index.html';
        }
        
        let players = [];
        
        async function loadData() {
            try {
                const res = await fetch('/api/save-data');
                const data = await res.json();
                players = data.players || [];
                renderTable();
                updateStats();
            } catch (err) {
                console.error('Failed to load');
            }
        }
        
        function updateStats() {
            document.getElementById('statTotal').textContent = players.length;
            document.getElementById('statTracker').textContent = players.filter(p => p.tracker).length;
            document.getElementById('statImages').textContent = players.filter(p => p.image).length;
        }
        
        function renderTable() {
            const tbody = document.getElementById('rosterBody');
            if (!players.length) {
                tbody.innerHTML = '<tr><td colspan="3" class="empty">No players found.</td></tr>';
                return;
            }
            tbody.innerHTML = players.map((p, i) => `
                <tr>
                    <td><span class="player-tag">${p.tag}</span></td>
                    <td>${p.country || '—'}</td>
                    <td style="text-align:right;"><button class="delete-btn" onclick="deletePlayer(${i})">Remove</button></td>
                </tr>
            `).join('');
        }
        
        async function addPlayer() {
            const tag = document.getElementById('pTag').value.trim();
            if (!tag) return alert('Tag required');
            
            players.push({
                tag: tag,
                country: document.getElementById('pCountry').value.trim(),
                tracker: document.getElementById('pTracker').value.trim(),
                image: document.getElementById('pImage').value.trim()
            });
            
            await saveData();
            document.getElementById('pTag').value = '';
            document.getElementById('pCountry').value = '';
            document.getElementById('pTracker').value = '';
            document.getElementById('pImage').value = '';
            showToast('Player added successfully');
        }
        
        async function deletePlayer(i) {
            if (!confirm('Remove this player?')) return;
            players.splice(i, 1);
            await saveData();
            showToast('Player removed');
        }
        
        async function saveData() {
            try {
                await fetch('/api/save-data', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ players })
                });
                renderTable();
                updateStats();
            } catch (err) {
                alert('Failed to save data. Please check your backend connection.');
            }
        }
        
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        loadData();
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
