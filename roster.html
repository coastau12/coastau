<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Roster — Coast</title>
    <link rel="icon" href="https://i.postimg.cc/mkyVn8Mr/Coast.webp"/>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --bg: #020614; --bg-card: #0a1536; --accent: #00d4ff; --text: #e2e8f0; --text-muted: #829ab1; --border: rgba(0, 212, 255, 0.15); --danger: #ff3366; }
        body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
        
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        nav { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 0 5%; height: 72px; background: rgba(2, 6, 20, 0.9); backdrop-filter: blur(18px); border-bottom: 1px solid var(--border); animation: fadeIn 0.8s ease-out; }
        .nav-logo img { height: 42px; border-radius: 8px; transition: transform 0.3s; }
        .nav-logo img:hover { transform: scale(1.05); }
        .nav-links { display: flex; gap: 36px; list-style: none; }
        .nav-links a { color: var(--text-muted); text-decoration: none; font-size: 13px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; transition: all 0.3s; position: relative; }
        .nav-links a::after { content: ''; position: absolute; left: 0; bottom: -4px; width: 0; height: 1px; background: var(--accent); transition: width 0.25s; }
        .nav-links a:hover, .nav-links a.active { color: var(--accent); }
        .nav-links a.active::after { width: 100%; }
        .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; }
        .hamburger span { width: 24px; height: 2px; background: var(--text); border-radius: 2px; }
        .mobile-menu { display: none; position: fixed; inset: 0; z-index: 999; background: rgba(2,6,20,0.98); backdrop-filter: blur(24px); flex-direction: column; align-items: center; justify-content: center; gap: 32px; }
        .mobile-menu.open { display: flex; animation: fadeIn 0.3s; }
        .mobile-menu a { font-size: 28px; font-weight: 700; color: var(--text); text-decoration: none; text-transform: uppercase; }
        .mobile-close { position: absolute; top: 24px; right: 5%; font-size: 28px; background: none; border: none; color: var(--text-muted); cursor: pointer; }

        .content-wrapper { flex: 1; display: flex; flex-direction: column; max-width: 1000px; width: 100%; margin: 0 auto; padding: 140px 5% 80px; }
        .page-header { padding-bottom: 40px; border-bottom: 1px solid var(--border); animation: fadeInUp 0.6s ease-out; }
        .page-label { font-size: 12px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--accent); margin-bottom: 16px; font-weight: 600; }
        .page-title { font-size: clamp(48px, 10vw, 100px); font-weight: 700; line-height: 0.9; letter-spacing: -0.03em; text-transform: uppercase; }
        .page-title span { color: var(--accent); }

        .roster-list { padding-top: 10px; }
        .player-row { display: flex; justify-content: space-between; align-items: center; padding: 24px 0; border-bottom: 1px solid rgba(255,255,255,0.05); text-decoration: none; color: var(--text); transition: all 0.3s; position: relative; animation: fadeInUp 0.6s ease-out both; }
        .player-row:nth-child(1) { animation-delay: 0.1s; }
        .player-row:nth-child(2) { animation-delay: 0.2s; }
        .player-row:nth-child(3) { animation-delay: 0.3s; }
        .player-row:nth-child(4) { animation-delay: 0.4s; }
        .player-row::before { content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%); width: 0; height: 1px; background: var(--accent); transition: width 0.3s; }
        .player-row:hover { padding-left: 20px; background: rgba(0, 212, 255, 0.03); }
        .player-row:hover::before { width: 12px; }
        
        .player-info { display: flex; flex-direction: column; }
        .player-tag { font-size: 28px; font-weight: 700; text-transform: uppercase; letter-spacing: -0.01em; margin-bottom: 4px; transition: color 0.3s; }
        .player-row:hover .player-tag { color: var(--accent); }
        .player-meta { font-size: 14px; color: var(--text-muted); }
        
        .player-action { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; opacity: 0; transition: all 0.3s; transform: translateX(-10px); }
        .player-row:hover .player-action { opacity: 1; color: var(--accent); transform: translateX(0); }

        .empty-state { padding: 40px 0; text-align: left; color: var(--text-muted); font-style: italic; animation: fadeIn 0.6s; }

        footer { border-top: 1px solid var(--border); padding: 24px 5%; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; font-size: 12px; color: var(--text-muted); animation: fadeIn 1s ease-out 0.5s both; }
        footer img { height: 28px; border-radius: 6px; }
        .footer-hash { display: flex; gap: 16px; color: var(--accent); font-weight: 600; }

        .admin-drawer { position: fixed; top: 0; right: 0; bottom: 0; width: 100%; max-width: 400px; background: rgba(2, 6, 20, 0.98); backdrop-filter: blur(20px); border-left: 1px solid var(--border); z-index: 10000; transform: translateX(100%); transition: transform 0.3s ease-out; display: flex; flex-direction: column; }
        .admin-drawer.open { transform: translateX(0); }
        .drawer-header { padding: 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .drawer-title { font-size: 14px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
        .drawer-close { background: none; border: none; color: var(--text-muted); font-size: 24px; cursor: pointer; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; transition: transform 0.3s; }
        .drawer-close:hover { transform: rotate(90deg); }
        .drawer-body { padding: 40px 24px; flex: 1; }
        .login-field { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text); padding: 16px; border-radius: 6px; font-family: inherit; font-size: 16px; letter-spacing: 2px; margin-bottom: 16px; outline: none; transition: 0.3s; }
        .login-field:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1); }
        .login-btn { width: 100%; background: var(--danger); color: var(--text); border: none; padding: 16px; border-radius: 6px; font-family: inherit; font-size: 13px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: all 0.3s; }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255, 51, 102, 0.2); }
        .login-error { color: var(--danger); font-size: 12px; margin-top: 12px; text-align: center; display: none; }
        
        @media(max-width:640px){ .nav-links { display: none; } .hamburger { display: flex; } .player-tag { font-size: 22px; } .content-wrapper { padding-top: 100px; } }
    </style>
</head>
<body>
    <div class="mobile-menu" id="mobileMenu">
        <button class="mobile-close" onclick="closeMobile()">✕</button>
        <a href="index.html">Home</a><a href="about.html">About</a><a href="roster.html">Roster</a>
        <a href="partners.html">Partners</a><a href="merch.html">Merch</a><a href="contact.html">Contact</a>
    </div>

    <nav>
        <a href="index.html" class="nav-logo"><img src="https://i.postimg.cc/mkyVn8Mr/Coast.webp" alt="Coast"/></a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="roster.html" class="active">Roster</a></li>
            <li><a href="partners.html">Partners</a></li>
            <li><a href="merch.html">Merch</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        <div class="hamburger" onclick="openMobile()"><span></span><span></span><span></span></div>
    </nav>

    <main class="content-wrapper">
        <div class="page-header">
            <div class="page-label">Competitive Team</div>
            <h1 class="page-title">Active<br><span>Roster</span></h1>
        </div>

        <div class="roster-list" id="rosterContainer">
            <div class="empty-state">Loading roster...</div>
        </div>
    </main>

    <footer>
        <img src="https://i.postimg.cc/mkyVn8Mr/Coast.webp" alt="Coast"/>
        <span>2026 Coast Esports. All Rights Reserved.</span>
        <div class="footer-hash"><span>#CoastUp</span><span>#TheTideIsRising</span></div>
    </footer>

    <div class="admin-drawer" id="adminDrawer">
        <div class="drawer-header">
            <span class="drawer-title">Admin Access</span>
            <button class="drawer-close" onclick="closeAdminDrawer()">✕</button>
        </div>
        <div class="drawer-body">
            <input type="password" id="adminPass" class="login-field" placeholder="Enter password..." onkeydown="if(event.key==='Enter') loginAdmin()"/>
            <button class="login-btn" onclick="loginAdmin()">Authenticate</button>
            <div class="login-error" id="loginError">Invalid password.</div>
        </div>
    </div>

    <script>
        function openMobile() { document.getElementById('mobileMenu').classList.add('open'); document.body.style.overflow = 'hidden'; }
        function closeMobile() { document.getElementById('mobileMenu').classList.remove('open'); document.body.style.overflow = ''; }
        
        const drawer = document.getElementById('adminDrawer');
        const passInput = document.getElementById('adminPass');
        const error = document.getElementById('loginError');
        
        function openAdminDrawer() { drawer.classList.add('open'); passInput.focus(); }
        function closeAdminDrawer() { drawer.classList.remove('open'); error.style.display = 'none'; passInput.value = ''; }
        
        async function loginAdmin() {
            const btn = document.querySelector('.login-btn');
            const originalText = btn.textContent;
            btn.textContent = 'VERIFYING...';
            error.style.display = 'none';

            try {
                const res = await fetch('/api/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: passInput.value })
                });

                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('coast_admin_auth', 'true');
                    window.location.href = 'admin.html';
                } else {
                    error.textContent = 'Invalid password.';
                    error.style.display = 'block';
                    passInput.value = '';
                }
            } catch (err) {
                error.textContent = 'Server error. Try again.';
                error.style.display = 'block';
            } finally {
                btn.textContent = originalText;
            }
        }
        
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && (e.key === 'q' || e.key === 'Q')) { e.preventDefault(); openAdminDrawer(); }
            if (e.key === 'Escape') closeAdminDrawer();
        });
        
        async function loadRoster() {
            try {
                const res = await fetch('/api/save-data');
                const data = await res.json();
                const players = data.players || [];
                const container = document.getElementById('rosterContainer');
                
                if (!players.length) {
                    container.innerHTML = '<div class="empty-state">Roster is currently empty. Players will appear here once added.</div>';
                    return;
                }
                
                container.innerHTML = players.map((p, index) => {
                    const trackerHtml = p.tracker ? `<span class="player-action">View Profile →</span>` : '';
                    const metaHtml = p.country ? `<div class="player-meta">${p.country}</div>` : '';

                    return `
                        <a href="${p.tracker || '#'}" target="_blank" class="player-row" style="animation-delay: ${index * 0.1}s" ${!p.tracker ? 'style="pointer-events:none;"' : ''}>
                            <div class="player-info">
                                <div class="player-tag">${p.tag}</div>
                                ${metaHtml}
                            </div>
                            ${trackerHtml}
                        </a>
                    `;
                }).join('');
            } catch (err) {
                document.getElementById('rosterContainer').innerHTML = '<div class="empty-state">Failed to load roster. Please ensure your backend is running.</div>';
            }
        }
        loadRoster();
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => { if (e.ctrlKey && (e.key === 'u' || e.key === 'U')) e.preventDefault(); });
    </script>
</body>
</html>
