<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Roster — Coast</title>
    
    <meta name="title" content="Coast Esports">
    <meta name="description" content="Professional esports organization competing at the highest level. The tide is rising.">
    <meta name="theme-color" content="#00d4ff">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Coast Esports">
    <meta property="og:description" content="Professional esports organization competing at the highest level. The tide is rising.">
    <meta property="og:image" content="https://i.postimg.cc/52hvw8Qd/Coast-Banner.png">
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:title" content="Coast Esports">
    <meta property="twitter:description" content="Professional esports organization competing at the highest level. The tide is rising.">
    <meta property="twitter:image" content="https://i.postimg.cc/52hvw8Qd/Coast-Banner.png">

    <link rel="icon" href="https://i.postimg.cc/mkyVn8Mr/Coast.webp"/>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --bg: #020614; --bg-card: #0a1536; --accent: #00d4ff; --text: #e2e8f0; --text-muted: #829ab1; --border: rgba(0, 212, 255, 0.15); --danger: #ff3366; }
        
        /* Custom Coast Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: rgba(0, 212, 255, 0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; overflow-y: auto; animation: pageFadeIn 0.5s ease-out forwards; opacity: 0; }
        @keyframes pageFadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        body.fade-out { animation: pageFadeOut 0.4s ease-in forwards; }
        @keyframes pageFadeOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-15px); } }
        
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        nav { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 0 5%; height: 72px; background: rgba(2, 6, 20, 0.9); backdrop-filter: blur(18px); border-bottom: 1px solid var(--border); animation: fadeIn 0.8s ease-out; }
        .nav-logo img { height: 42px; border-radius: 8px; transition: transform 0.3s; }
        .nav-logo img:hover { transform: scale(1.05); }
        .nav-links { display: flex; gap: 36px; list-style: none; }
        .nav-links a { color: var(--text-muted); text-decoration: none; font-size: 13px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; transition: all 0.3s; position: relative; }
        .nav-links a::after { content: ''; position: absolute; left: 0; bottom: -4px; width: 0; height: 1px; background: var(--accent); transition: width 0.25s; }
        .nav-links a:hover, .nav-links a.active { color: var(--accent); }
        .nav-links a.active::after { width: 100%; }
        .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; }
        .hamburger span { width: 24px; height: 2px; background: var(--text); border-radius: 2px; }
        .mobile-menu { display: none; position: fixed; inset: 0; z-index: 999; background: rgba(2,6,20,0.98); backdrop-filter: blur(24px); flex-direction: column; align-items: center; justify-content: center; gap: 32px; }
        .mobile-menu.open { display: flex; animation: fadeIn 0.3s; }
        .mobile-menu a { font-size: 28px; font-weight: 700; color: var(--text); text-decoration: none; text-transform: uppercase; }
        .mobile-close { position: absolute; top: 24px; right: 5%; font-size: 28px; background: none; border: none; color: var(--text-muted); cursor: pointer; }

        .content-wrapper { flex: 1; display: flex; flex-direction: column; max-width: 1000px; width: 100%; margin: 0 auto; padding: 140px 5% 80px; }
        .page-header { padding-bottom: 40px; border-bottom: 1px solid var(--border); animation: fadeInUp 0.6s ease-out; }
        .page-label { font-size: 12px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--accent); margin-bottom: 16px; font-weight: 600; }
        .page-title { font-size: clamp(48px, 10vw, 100px); font-weight: 700; line-height: 0.9; letter-spacing: -0.03em; text-transform: uppercase; }
        .page-title span { color: var(--accent); }

        .roster-list { padding-top: 10px; }
        
        /* Skeleton Loader CSS */
        .skeleton { background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(0,212,255,0.08) 50%, rgba(255,255,255,0.03) 75%); background-size: 200% 100%; animation: loading 1.5s infinite; border-radius: 4px; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .skel-row { display: flex; justify-content: space-between; align-items: center; padding: 24px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .skel-tag { width: 180px; height: 32px; margin-bottom: 8px; }
        .skel-meta { width: 120px; height: 16px; }
        .skel-links { width: 100px; height: 20px; }

        .player-row { display: flex; justify-content: space-between; align-items: center; padding: 24px 0; border-bottom: 1px solid rgba(255,255,255,0.05); color: var(--text); transition: all 0.3s; position: relative; animation: fadeInUp 0.6s ease-out both; }
        .player-row::before { content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 0; background: var(--accent); transition: width 0.3s ease; }
        .player-row:hover { padding-left: 20px; background: rgba(0, 212, 255, 0.03); }
        .player-row:hover::before { width: 3px; }
        
        .player-info { display: flex; flex-direction: column; }
        .player-tag { font-size: 28px; font-weight: 700; text-transform: uppercase; letter-spacing: -0.01em; margin-bottom: 4px; transition: color 0.3s; }
        .player-row:hover .player-tag { color: var(--accent); }
        
        .player-details { display: flex; gap: 12px; align-items: center; }
        .player-meta { font-size: 14px; color: var(--text-muted); }
        .duo-badge { font-size: 10px; color: var(--accent); background: rgba(0, 212, 255, 0.1); border: 1px solid rgba(0, 212, 255, 0.2); padding: 2px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; }
        
        .player-links { display: flex; gap: 20px; align-items: center; }
        .social-link { display: flex; align-items: center; font-size: 13px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; text-decoration: none; transition: all 0.3s; font-weight: 500; }
        .social-link:hover { color: var(--text); }

        .twitter-link-btn { height: 16px; width: 16px; margin-right: 6px; }
        .twitter-link-btn svg { fill: var(--text-muted); height: 100%; transition: all 0.3s; }
        .social-link:hover .twitter-link-btn svg { fill: var(--text); }
        
        .tracker-link { font-size: 13px; color: var(--text); text-transform: uppercase; letter-spacing: 0.1em; text-decoration: none; font-weight: 700; transition: color 0.3s; }
        .tracker-link:hover { color: var(--accent); }

        .empty-state { padding: 40px 0; text-align: left; color: var(--text-muted); font-style: italic; animation: fadeIn 0.6s; }

        footer { border-top: 1px solid var(--border); padding: 24px 5%; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; font-size: 12px; color: var(--text-muted); animation: fadeIn 1s ease-out 0.5s both; }
        footer img { height: 28px; border-radius: 6px; }
        .footer-hash { display: flex; gap: 16px; color: var(--accent); font-weight: 600; }

        .admin-drawer { position: fixed; top: 0; right: 0; bottom: 0; width: 100%; max-width: 400px; background: rgba(2, 6, 20, 0.95); backdrop-filter: blur(25px); border-left: 1px solid rgba(0, 212, 255, 0.2); box-shadow: -10px 0 40px rgba(0, 0, 0, 0.5); z-index: 10000; transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; }
        .admin-drawer.open { transform: translateX(0); }
        .drawer-header { padding: 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .drawer-title { font-size: 14px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); }
        .drawer-close { background: none; border: none; color: var(--text-muted); font-size: 24px; cursor: pointer; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; transition: color 0.3s; }
        .drawer-close:hover { color: var(--accent); }
        .drawer-body { padding: 40px 24px; flex: 1; }
        .login-field { width: 100%; background: rgba(0, 0, 0, 0.3); border: 1px solid var(--border); color: var(--text); padding: 16px; border-radius: 6px; font-family: inherit; font-size: 16px; letter-spacing: 2px; margin-bottom: 16px; outline: none; transition: all 0.3s; }
        .login-field:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1); }
        .login-btn { width: 100%; background: transparent; color: var(--accent); border: 1px solid var(--accent); padding: 16px; border-radius: 6px; font-family: inherit; font-size: 13px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: all 0.3s; position: relative; overflow: hidden; }
        .login-btn::before { content: ''; position: absolute; top: 0; left: 0; width: 0; height: 100%; background: var(--accent); transition: width 0.3s; z-index: -1; }
        .login-btn:hover::before { width: 100%; }
        .login-btn:hover { color: #000; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0, 212, 255, 0.2); }
        .login-error { color: var(--danger); font-size: 12px; margin-top: 12px; text-align: center; display: none; }
        
        @media(max-width:640px){ 
            .nav-links { display: none; } 
            .hamburger { display: flex; } 
            .player-tag { font-size: 22px; } 
            .content-wrapper { padding-top: 100px; } 
            .player-details { flex-direction: column; align-items: flex-start; gap: 4px; }
            .player-links { flex-direction: column; gap: 10px; align-items: flex-end; }
        }
    </style>
</head>
<body>
    <div class="mobile-menu" id="mobileMenu">
        <button class="mobile-close" onclick="closeMobile()">✕</button>
        <a href="index.html">Home</a><a href="about.html">About</a><a href="roster.html">Roster</a>
        <a href="partners.html">Partners</a><a href="merch.html">Merch</a><a href="contact.html">Contact</a>
    </div>

    <nav>
        <a href="index.html" class="nav-logo"><img src="https://i.postimg.cc/mkyVn8Mr/Coast.webp" alt="Coast"/></a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="roster.html" class="active">Roster</a></li>
            <li><a href="partners.html">Partners</a></li>
            <li><a href="merch.html">Merch</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        <div class="hamburger" onclick="openMobile()"><span></span><span></span><span></span></div>
    </nav>

    <main class="content-wrapper">
        <div class="page-header">
            <div class="page-label">Competitive Team</div>
            <h1 class="page-title">Active<br><span>Roster</span></h1>
        </div>

        <div class="roster-list" id="rosterContainer">
            <div class="skel-row">
                <div><div class="skeleton skel-tag"></div><div class="skeleton skel-meta"></div></div>
                <div class="skeleton skel-links"></div>
            </div>
            <div class="skel-row">
                <div><div class="skeleton skel-tag"></div><div class="skeleton skel-meta"></div></div>
                <div class="skeleton skel-links"></div>
            </div>
            <div class="skel-row">
                <div><div class="skeleton skel-tag"></div><div class="skeleton skel-meta"></div></div>
                <div class="skeleton skel-links"></div>
            </div>
        </div>
    </main>

    <footer>
        <img src="https://i.postimg.cc/mkyVn8Mr/Coast.webp" alt="Coast"/>
        <span>2026 Coast Esports. All Rights Reserved.</span>
        <div class="footer-hash"><span>#CoastUp</span><span>#TheTideIsRising</span></div>
    </footer>

    <div class="admin-drawer" id="adminDrawer">
        <div class="drawer-header">
            <span class="drawer-title">Command Center</span>
            <button class="drawer-close" onclick="closeAdminDrawer()">✕</button>
        </div>
        <div class="drawer-body">
            <input type="password" id="adminPass" class="login-field" placeholder="Access Code..." onkeydown="if(event.key==='Enter') loginAdmin()"/>
            <button class="login-btn" onclick="loginAdmin()">Authenticate</button>
            <div class="login-error" id="loginError">Access Denied.</div>
        </div>
    </div>

    <script>
        function openMobile() { document.getElementById('mobileMenu').classList.add('open'); document.body.style.overflow = 'hidden'; }
        function closeMobile() { document.getElementById('mobileMenu').classList.remove('open'); document.body.style.overflow = 'hidden'; }
        
        const drawer = document.getElementById('adminDrawer');
        const passInput = document.getElementById('adminPass');
        const error = document.getElementById('loginError');
        
        function openAdminDrawer() { drawer.classList.add('open'); passInput.focus(); }
        function closeAdminDrawer() { drawer.classList.remove('open'); error.style.display = 'none'; passInput.value = ''; }
        
        async function loginAdmin() {
            const btn = document.querySelector('.login-btn');
            const originalText = btn.textContent;
            btn.textContent = 'VERIFYING...';
            error.style.display = 'none';

            try {
                const res = await fetch('/api/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: passInput.value })
                });

                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('coast_admin_auth', 'true');
                    document.body.classList.add('fade-out');
                    setTimeout(() => window.location.href = 'admin.html', 350);
                } else {
                    error.textContent = 'Access Denied.';
                    error.style.display = 'block';
                    passInput.value = '';
                }
            } catch (err) {
                error.textContent = 'Connection Error.';
                error.style.display = 'block';
            } finally {
                btn.textContent = originalText;
            }
        }
        
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && (e.key === 'q' || e.key === 'Q')) { e.preventDefault(); openAdminDrawer(); }
            if (e.key === 'Escape') closeAdminDrawer();
        });
        
        async function loadRoster() {
            try {
                const res = await fetch('/api/save-data');
                const data = await res.json();
                const players = data.players || [];
                const container = document.getElementById('rosterContainer');
                
                if (!players.length) {
                    container.innerHTML = '<div class="empty-state">Roster is currently empty. Players will appear here once added.</div>';
                    return;
                }
                
                container.innerHTML = players.map((p, index) => {
                    const metaHtml = p.country ? `<span class="player-meta">${p.country}</span>` : '';
                    const duoHtml = p.duo ? `<span class="duo-badge">Duo w/ ${p.duo}</span>` : '';
                    
                    const twitchHtml = p.twitch ? `<a href="${p.twitch}" target="_blank" class="social-link">Twitch</a>` : '';
                    const xLogoSvg = '<div class="twitter-link-btn"><svg viewBox="0 0 24 24"><g><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"></path></g></svg></div>';
                    const twitterHtml = p.twitter ? `<a href="${p.twitter}" target="_blank" class="social-link">${xLogoSvg}</a>` : '';
                    const trackerHtml = p.tracker ? `<a href="${p.tracker}" target="_blank" class="tracker-link">Tracker →</a>` : '';

                    return `
                        <div class="player-row" style="animation-delay: ${index * 0.1}s">
                            <div class="player-info">
                                <div class="player-tag">${p.tag}</div>
                                <div class="player-details">
                                    ${metaHtml}
                                    ${duoHtml}
                                </div>
                            </div>
                            <div class="player-links">
                                ${twitchHtml}
                                ${twitterHtml}
                                ${trackerHtml}
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                document.getElementById('rosterContainer').innerHTML = '<div class="empty-state">Failed to load roster. Please ensure your backend is running.</div>';
            }
        }
        
        // Artificial delay for the premium skeleton loading effect
        setTimeout(loadRoster, 800);
        
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => { if (e.ctrlKey && (e.key === 'u' || e.key === 'U')) e.preventDefault(); });

        document.querySelectorAll('a').forEach(link => {
            if (link.hostname === window.location.hostname && !link.target && !link.hasAttribute('download') && link.getAttribute('href') !== '#' && !link.href.startsWith('mailto:')) {
                link.addEventListener('click', e => {
                    e.preventDefault();
                    const target = link.href;
                    document.body.classList.add('fade-out');
                    setTimeout(() => window.location.href = target, 350);
                });
            }
        });
    </script>
</body>
</html>
